name: Build reports

on:
  workflow_dispatch:
  push:
    paths:
      - "reports/**/*.md"
      - ".agents/skills/gen-report/**"

jobs:
  build-docx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc
      - name: Build DOCX files
        run: |
          mkdir -p build
          find reports -name report.md -print0 | while IFS= read -r -d '' file; do
            dir=$(dirname "$file")
            name=$(basename "$dir")
            pandoc "$file" --toc --number-sections --from=gfm --to=docx -o "build/${name}.docx"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: greensync-reports-docx
          path: build/*.docx
