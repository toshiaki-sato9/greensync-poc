esphome:
  name: greensync-watering-001

esp32:
  board: m5stack-atom
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:

api:

ota:
  platform: esphome

sensor:
  - platform: adc
    pin: GPIO32
    id: soil_voltage
    name: "Soil Voltage"
    attenuation: auto
    update_interval: 10s

  - platform: template
    id: soil_adc_mv
    name: "Soil ADC mV"
    unit_of_measurement: "mV"
    lambda: |-
      return roundf(id(soil_voltage).state * 1000.0f);
    update_interval: 10s

text_sensor:
  - platform: template
    name: "Soil Moisture State"
    icon: "mdi:water-percent"
    lambda: |-
      const int ADC_DRY = 1550;
      const int ADC_WET = 1450;

      if (id(soil_adc_mv).state >= ADC_DRY) {
        return {"Dry"};
      } else if (id(soil_adc_mv).state >= ADC_WET) {
        return {"Wet"};
      } else {
        return {"Saturated"};
      }
    update_interval: 10s

switch:
  - platform: gpio
    pin: GPIO26
    id: water_pump
    name: "Water Pump"
    icon: "mdi:water-pump"
    restore_mode: RESTORE_DEFAULT_OFF
